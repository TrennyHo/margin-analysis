services:
  - type: web
    name: margin-analysis
    runtime: python
    buildCommand: "apt-get install -y fonts-noto-cjk && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --timeout 120 --workers 2"
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
